services:
  # Eureka Service Discovery
  eureka-service:
    build: ./eureka-service
    container_name: eureka-service
    ports:
      - "8761:8761"
    networks:
      - fitness-network

  # Database for User Service (fitness_goals, trainer_clients)
  user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    networks:
      - fitness-network

  # Database for Auth Service (users, roles)
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5436:5432"
    networks:
      - fitness-network

  # Database for Notification Service (notifications)
  notification-db:
    image: postgres:16-alpine
    container_name: notification-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5437:5432"
    networks:
      - fitness-network

  # Database for Nutrition Service
  nutrition-db:
    image: postgres:16-alpine
    container_name: nutrition-db
    environment:
      POSTGRES_DB: nutrition_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    networks:
      - fitness-network

  # Database for Workout Service
  workout-db:
    image: postgres:16-alpine
    container_name: workout-db
    environment:
      POSTGRES_DB: workout_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    networks:
      - fitness-network

  # User Service (fitness_goals, trainer_clients)
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8080"
    environment:
      DB_HOST: user-db
      DB_PORT: 5432
      DB_NAME: user_db
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      - user-db
    networks:
      - fitness-network

  # Auth Service (users, roles)
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8084:8080"
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      - auth-db
    networks:
      - fitness-network

  # Notification Service (notifications)
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8085:8080"
    environment:
      DB_HOST: notification-db
      DB_PORT: 5432
      DB_NAME: notification_db
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      - notification-db
    networks:
      - fitness-network

  # Nutrition Service
  nutrition-service:
    build: ./nutrition-service
    container_name: nutrition-service
    ports:
      - "8082:8080"
    environment:
      DB_HOST: nutrition-db
      DB_PORT: 5432
      DB_NAME: nutrition_db
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      - nutrition-db
    networks:
      - fitness-network

  # Workout Service
  workout-service:
    build: ./workout-service
    container_name: workout-service
    ports:
      - "8083:8081"
    environment:
      DB_HOST: workout-db
      DB_PORT: 5432
      DB_NAME: workout_db
      DB_USER: postgres
      DB_PASSWORD: password
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-service:8761/eureka
    depends_on:
      - workout-db
      - eureka-service
    networks:
      - fitness-network

  # Workout Service Instance 2 (for load balancing)
  workout-service-2:
    build: ./workout-service
    container_name: workout-service-2
    ports:
      - "8086:8081"
    environment:
      DB_HOST: workout-db
      DB_PORT: 5432
      DB_NAME: workout_db
      DB_USER: postgres
      DB_PASSWORD: password
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-service:8761/eureka
    depends_on:
      - workout-db
      - eureka-service
    networks:
      - fitness-network

  # Pg Admin
  pgadmin:
    image: dpage/pgadmin4
    container_name: itsupport-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - user-db
      - auth-db
      - notification-db
      - nutrition-db
      - workout-db
    networks:
      - fitness-network

networks:
  fitness-network:
    driver: bridge
