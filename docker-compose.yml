services:
  # Database for User Service
  user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    networks:
      - fitness-network

  # Database for Nutrition Service
  nutrition-db:
    image: postgres:16-alpine
    container_name: nutrition-db
    environment:
      POSTGRES_DB: nutrition_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    networks:
      - fitness-network

  # Database for Workout Service
  workout-db:
    image: postgres:16-alpine
    container_name: workout-db
    environment:
      POSTGRES_DB: workout_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    networks:
      - fitness-network

  # User Service
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8080"
    environment:
      DB_HOST: user-db
      DB_PORT: 5432
      DB_NAME: user_db
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      - user-db
    networks:
      - fitness-network

  # Nutrition Service
  nutrition-service:
    build: ./nutrition-service
    container_name: nutrition-service
    ports:
      - "8082:8080"
    environment:
      DB_HOST: nutrition-db
      DB_PORT: 5432
      DB_NAME: nutrition_db
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      - nutrition-db
    networks:
      - fitness-network

  # Workout Service
  workout-service:
    build: ./workout-service
    container_name: workout-service
    ports:
      - "8083:8080"
    environment:
      DB_HOST: workout-db
      DB_PORT: 5432
      DB_NAME: workout_db
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      - workout-db
    networks:
      - fitness-network

networks:
  fitness-network:
    driver: bridge
